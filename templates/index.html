<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess.com Aberturas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/chessboardjs/chessboard-1.0.0.min.css') }}" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>ChessEdu <span id="app-version" class="app-version">v0.0</span></h1>
      </header>

      <div id="status" class="status-message"></div>

      <section class="layout">
        <aside class="panel settings-panel">
          <div class="controls-row controls-stack">
            <label for="username">Usuário Chess.com</label>
            <input id="username" type="text" placeholder="seu_username" />
            <button id="sync-btn" type="button">
              <span class="btn-label">Atualizar banco (incremental)</span>
              <span class="btn-spinner" aria-hidden="true"></span>
            </button>
            <span id="db-count" class="badge">Banco: 0 partidas</span>
          </div>

          <div class="filter-block">
            <label for="color-filter">Filtro de cor</label>
            <select id="color-filter">
              <option value="any">Tanto faz</option>
              <option value="white">Brancas</option>
              <option value="black">Pretas</option>
            </select>
          </div>
        </aside>

        <div class="panel board-panel">
          <div id="game-meta" class="game-meta"></div>
          <div id="player-top" class="player-tag">-</div>
          <div class="board-wrap">
            <div id="board"></div>
          </div>
          <div id="player-bottom" class="player-tag">-</div>
          <div class="replay-actions">
            <button id="replay-first" type="button" disabled>|&lt;</button>
            <button id="replay-prev" type="button" disabled>&lt;</button>
            <button id="replay-next" type="button" disabled>&gt;</button>
            <button id="replay-last" type="button" disabled>&gt;|</button>
          </div>
          <div id="games-list" class="list games-list"></div>
        </div>

        <div class="panel moves-panel">
          <div class="moves-toolbar">
            <div class="moves-toolbar-left">
              <button id="reset-btn">Início</button>
              <button id="back-btn">Voltar lance</button>
            </div>
          </div>
          <div id="moves-list" class="list"></div>
        </div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='vendor/jquery/jquery-3.7.1.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/chessjs/chess.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/chessboardjs/chessboard-1.0.0.min.js') }}"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
