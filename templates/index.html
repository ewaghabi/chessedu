<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess.com Aberturas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/chessboardjs/chessboard-1.0.0.min.css') }}" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>ChessEdu <span id="app-version" class="app-version">v0.0</span></h1>
      </header>

      <div id="status" class="status-message"></div>

      <section class="layout">
        <aside class="panel settings-panel">
          <div class="controls-row controls-stack">
            <label for="username">Usuário Chess.com</label>
            <input id="username" type="text" placeholder="seu_username" />
            <button id="sync-btn" type="button">
              <span class="btn-label">Atualizar banco (incremental)</span>
              <span class="btn-spinner" aria-hidden="true"></span>
            </button>
            <span id="db-count" class="badge">Banco: 0 partidas</span>
          </div>

          <div class="filter-block">
            <label id="color-filter-label" for="color-filter">Jogador joga de:</label>
            <select id="color-filter">
              <option value="any">Tanto faz</option>
              <option value="white">Brancas</option>
              <option value="black">Pretas</option>
            </select>
          </div>

          <div class="filter-block toggle-block">
            <label class="check-row" for="auto-flip">
              <input id="auto-flip" type="checkbox" />
              <span>Inverter automaticamente o tabuleiro</span>
            </label>
          </div>

          <div class="filter-block">
            <span class="filter-title">Ritmo</span>
            <label class="check-row" for="time-blitz">
              <input id="time-blitz" type="checkbox" checked />
              <span>Blitz</span>
            </label>
            <label class="check-row" for="time-rapid">
              <input id="time-rapid" type="checkbox" checked />
              <span>Rapid</span>
            </label>
            <label class="check-row" for="time-bullet">
              <input id="time-bullet" type="checkbox" checked />
              <span>Bullet</span>
            </label>
            <label class="check-row" for="time-outros">
              <input id="time-outros" type="checkbox" checked />
              <span>Outros</span>
            </label>
          </div>

          <div class="filter-block toggle-block">
            <label class="check-row" for="ignore-timeout-losses">
              <input id="ignore-timeout-losses" type="checkbox" />
              <span>Ignorar derrotas por tempo</span>
            </label>
          </div>

          <div id="filtered-count" class="filter-count">
            <div id="filtered-games-count">Partidas: 0</div>
            <div class="problems-row">
              <span id="filtered-problems-count">Problemas: 0</span>
              <button id="go-problems-btn" type="button" disabled>GO!</button>
            </div>
          </div>
        </aside>

        <div class="panel board-panel">
          <div id="game-meta" class="game-meta"></div>
          <div id="player-top" class="player-tag">-</div>
          <div class="board-wrap">
            <div id="board"></div>
          </div>
          <div id="player-bottom" class="player-tag">-</div>
          <div class="replay-actions">
            <button id="replay-first" type="button" disabled>|&lt;</button>
            <button id="replay-prev" type="button" disabled>&lt;</button>
            <button id="replay-next" type="button" disabled>&gt;</button>
            <button id="replay-last" type="button" disabled>&gt;|</button>
          </div>
          <div id="games-list" class="list games-list"></div>
        </div>

        <div class="panel moves-panel">
          <div class="moves-toolbar">
            <div class="moves-toolbar-left">
              <button id="reset-btn">|&lt;</button>
              <button id="back-btn">&lt;</button>
            </div>
          </div>
          <div id="moves-list" class="list"></div>
        </div>
      </section>
    </main>

    <div id="problem-modal-overlay" class="problem-modal-overlay hidden">
      <div class="problem-modal" role="dialog" aria-modal="true" aria-labelledby="problem-modal-title">
        <div class="problem-modal-header">
          <h2 id="problem-modal-title">Teste de Problemas</h2>
          <button id="problem-modal-close" class="problem-close-btn" type="button" aria-label="Fechar">X</button>
        </div>
        <div id="problem-modal-meta" class="problem-modal-meta">-</div>
        <div id="problem-player-top" class="player-tag">-</div>
        <div class="problem-board-wrap">
          <div id="problem-board"></div>
        </div>
        <div id="problem-eval-row" class="problem-eval-row hidden">
          <span id="problem-eval-prev" class="problem-eval-item">-</span>
          <span id="problem-eval-post" class="problem-eval-item">-</span>
        </div>
        <div id="problem-player-bottom" class="player-tag">-</div>
        <div class="problem-timer-wrap">
          <span class="problem-timer-label">Tempo:</span>
          <span id="problem-timer" class="problem-timer">00:00.0</span>
        </div>
        <div id="problem-feedback" class="problem-feedback">Faça o melhor lance da posição.</div>
        <div class="problem-actions">
          <button id="problem-next-btn" class="problem-btn-success hidden" type="button">Próximo problema</button>
          <button id="problem-repeat-btn" class="problem-btn-danger hidden" type="button">Repetir</button>
          <button id="problem-show-solution-btn" class="problem-btn-neutral hidden" type="button">Mostrar solução</button>
          <button id="problem-skip-btn" class="problem-btn-neutral" type="button">Pular problema</button>
        </div>
        <div class="problem-tools-row">
          <button id="problem-debug-hold-btn" class="problem-debug-btn" type="button" title="Segure para depurar">🔎🐞</button>
          <button id="problem-delete-btn" class="problem-delete-btn" type="button" title="Excluir problema">🗑️</button>
        </div>
      </div>
    </div>
    <div id="problem-delete-confirm-overlay" class="problem-confirm-overlay hidden">
      <div class="problem-confirm-modal" role="dialog" aria-modal="true" aria-labelledby="problem-delete-confirm-title">
        <h3 id="problem-delete-confirm-title">Excluir problema?</h3>
        <p>Essa ação remove permanentemente este problema da base de problemas.</p>
        <div class="problem-confirm-actions">
          <button id="problem-delete-cancel-btn" class="problem-btn-neutral" type="button">Cancelar</button>
          <button id="problem-delete-confirm-btn" class="problem-btn-danger" type="button">Excluir</button>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='vendor/jquery/jquery-3.7.1.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/chessjs/chess.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/chessboardjs/chessboard-1.0.0.min.js') }}"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
